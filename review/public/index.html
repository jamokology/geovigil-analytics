<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>GeoVigil Analytics — Candidate Review</title>
<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  #login-screen, #app {
    display: none;
    height: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .visible { display: flex !important; }

  .login-box {
    width: 100%;
    max-width: 320px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .login-box h1 {
    font-size: 18px;
    text-align: center;
    margin: 0 0 8px;
  }
  .login-box input {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #30363d;
    background: #161b22;
    color: #e6edf3;
    font-size: 16px;
  }
  .login-box button, #done-screen button {
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    background: #3fb950;
    color: #0d1117;
    font-weight: 600;
    font-size: 16px;
  }
  .error {
    color: #f85149;
    font-size: 13px;
    min-height: 16px;
    text-align: center;
  }

  #app {
    width: 100%;
    padding: 12px;
    gap: 10px;
  }
  #header {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #8b949e;
  }
  #results-link {
    color: #58a6ff;
    text-decoration: none;
  }
  #card-stack {
    position: relative;
    width: 100%;
    max-width: 480px;
    flex: 1;
    min-height: 0;
  }
  .card {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    overflow: hidden;
    background: #161b22;
    border: 1px solid #30363d;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    user-select: none;
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
  .stamp {
    position: absolute;
    top: 24px;
    padding: 6px 16px;
    border-radius: 8px;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 1px;
    border: 3px solid currentColor;
    opacity: 0;
    transform: rotate(-12deg);
  }
  .stamp.true { left: 24px; color: #3fb950; }
  .stamp.false { right: 24px; color: #f85149; }
  .stamp.hold { left: 50%; transform: translateX(-50%) rotate(0deg); color: #8b949e; }

  #controls {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 10px;
  }
  #controls button {
    flex: 1;
    padding: 14px 0;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 600;
  }
  #btn-false { background: #f85149; color: #fff; }
  #btn-hold { background: #30363d; color: #e6edf3; }
  #btn-true { background: #3fb950; color: #0d1117; }

  #done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
    padding: 24px;
  }
  #done-screen.visible { display: flex; }
</style>
</head>
<body>

<div id="login-screen" class="visible">
  <div class="login-box">
    <h1>GeoVigil Analytics<br/>Candidate Review</h1>
    <input id="reviewer-name" type="text" placeholder="Your name" autocomplete="name" />
    <input id="passphrase" type="password" placeholder="Passphrase" autocomplete="current-password" />
    <button id="login-btn">Start</button>
    <div class="error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div id="header">
    <span id="reviewer-label"></span>
    <span id="counter"></span>
    <a id="results-link" href="/results.html">Results</a>
  </div>
  <div id="card-stack">
    <div class="card" id="card">
      <div class="stamp true" id="stamp-true">TRUE</div>
      <div class="stamp false" id="stamp-false">FALSE</div>
      <img id="card-img" src="" alt="candidate" />
    </div>
    <div class="stamp hold" id="stamp-hold">HOLD</div>
  </div>
  <div id="controls">
    <button id="btn-false">✕ False</button>
    <button id="btn-hold">Hold</button>
    <button id="btn-true">✓ True</button>
  </div>
</div>

<div id="done-screen">
  <h2>All candidates reviewed 🎉</h2>
  <p>No more candidates left for this session. Check back later — new batches or held items may appear.</p>
  <button id="refresh-btn">Refresh</button>
  <a id="results-link" href="/results.html">View results &rarr;</a>
</div>

<script>
const state = {
  reviewerName: "",
  sessionId: crypto.randomUUID(),
  current: null,
  trueCount: 0,
  falseCount: 0,
  heldCount: 0,
};

const el = (id) => document.getElementById(id);

function show(id) {
  ["login-screen", "app", "done-screen"].forEach((s) => el(s).classList.remove("visible"));
  el(id).classList.add("visible");
}

el("login-btn").addEventListener("click", async () => {
  const name = el("reviewer-name").value.trim();
  const pass = el("passphrase").value;
  el("login-error").textContent = "";

  if (!name || !pass) {
    el("login-error").textContent = "Enter your name and the passphrase.";
    return;
  }

  const res = await fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ passphrase: pass }),
  });

  if (!res.ok) {
    el("login-error").textContent = "Incorrect passphrase.";
    return;
  }

  state.reviewerName = name;
  sessionStorage.setItem("gv_reviewer", name);
  el("reviewer-label").textContent = name;
  show("app");
  loadNext();
});

async function loadNext() {
  const res = await fetch(`/api/next?session=${state.sessionId}`);
  if (res.status === 401) {
    show("login-screen");
    return;
  }
  const { next } = await res.json();
  if (!next) {
    show("done-screen");
    return;
  }
  state.current = next;
  el("card-img").src = `/image/${next.image_key}`;
  el("counter").textContent = `True: ${state.trueCount}  ·  False: ${state.falseCount}  ·  Held: ${state.heldCount}`;
  resetCardPosition();
}

async function submitLabel(label) {
  if (!state.current) return;
  const candidate = state.current;
  state.current = null;

  await fetch("/api/review", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      candidate_id: candidate.id,
      reviewer_name: state.reviewerName,
      label,
      session_id: state.sessionId,
    }),
  });

  if (label === "hold") {
    state.heldCount += 1;
  } else if (label === "true") {
    state.trueCount += 1;
  } else {
    state.falseCount += 1;
  }
  loadNext();
}

el("btn-true").addEventListener("click", () => animateAndSubmit("true"));
el("btn-false").addEventListener("click", () => animateAndSubmit("false"));
el("btn-hold").addEventListener("click", () => animateAndSubmit("hold"));
el("refresh-btn").addEventListener("click", () => { show("app"); loadNext(); });

// --- swipe gestures ---
const card = el("card");
const stampTrue = el("stamp-true");
const stampFalse = el("stamp-false");
const stampHold = el("stamp-hold");
let dragging = false;
let startX = 0, startY = 0, dx = 0, dy = 0;

function resetCardPosition() {
  card.style.transition = "none";
  card.style.transform = "translate(0, 0) rotate(0deg)";
  stampTrue.style.opacity = 0;
  stampFalse.style.opacity = 0;
  stampHold.style.opacity = 0;
}

function pointerDown(x, y) {
  dragging = true;
  startX = x;
  startY = y;
  card.style.transition = "none";
}

function pointerMove(x, y) {
  if (!dragging) return;
  dx = x - startX;
  dy = y - startY;
  const rotate = dx / 12;
  card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rotate}deg)`;
  stampTrue.style.opacity = Math.min(Math.max(dx / 100, 0), 1);
  stampFalse.style.opacity = Math.min(Math.max(-dx / 100, 0), 1);
  stampHold.style.opacity = Math.min(Math.max(-dy / 100, 0), 1);
}

function pointerUp() {
  if (!dragging) return;
  dragging = false;
  const threshold = 100;
  if (dx > threshold) {
    animateAndSubmit("true");
  } else if (dx < -threshold) {
    animateAndSubmit("false");
  } else if (dy < -threshold) {
    animateAndSubmit("hold");
  } else {
    card.style.transition = "transform 0.2s ease";
    resetCardPosition();
  }
  dx = 0; dy = 0;
}

function animateAndSubmit(label) {
  card.style.transition = "transform 0.3s ease";
  if (label === "true") {
    card.style.transform = "translate(600px, -40px) rotate(50deg)";
  } else if (label === "false") {
    card.style.transform = "translate(-600px, -40px) rotate(-50deg)";
  } else {
    card.style.transform = "translate(0, -700px) rotate(0deg)";
  }
  submitLabel(label);
}

card.addEventListener("touchstart", (e) => pointerDown(e.touches[0].clientX, e.touches[0].clientY));
card.addEventListener("touchmove", (e) => pointerMove(e.touches[0].clientX, e.touches[0].clientY));
card.addEventListener("touchend", pointerUp);

card.addEventListener("mousedown", (e) => pointerDown(e.clientX, e.clientY));
window.addEventListener("mousemove", (e) => pointerMove(e.clientX, e.clientY));
window.addEventListener("mouseup", pointerUp);

// keyboard support for desktop testing
window.addEventListener("keydown", (e) => {
  if (!el("app").classList.contains("visible")) return;
  if (e.key === "ArrowRight") animateAndSubmit("true");
  if (e.key === "ArrowLeft") animateAndSubmit("false");
  if (e.key === "ArrowUp") animateAndSubmit("hold");
});
</script>
</body>
</html>
