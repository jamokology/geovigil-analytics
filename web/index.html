<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Orbit Sentinel</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #161b22;
      --surface2:#21262d;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --high:    #E53935;
      --mid:     #FB8C00;
      --low:     #1E88E5;
      --green:   #3fb950;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; overflow: hidden; }

    /* ── Layout ── */
    .layout { display: flex; height: 100dvh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 0; flex-shrink: 0;
      background: var(--surface);
      border-right: 0px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease, border-width 0.25s ease;
      z-index: 300;
    }
    .sidebar.open { width: 280px; border-right-width: 1px; overflow-y: auto; }
    .sidebar-inner { min-width: 280px; padding: 20px 18px; display: flex; flex-direction: column; gap: 16px; }

    /* ── Main ── */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ── */
    .header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .header-center { flex: 1; text-align: center; }
    .title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 600; letter-spacing: 0.05em; line-height: 1.0; color: var(--text); }
    .subtitle { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

    /* ── Filter bar ── */
    .filter-bar { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .filter-bar-row { display: flex; align-items: center; gap: 10px; }
    .filter-bar label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
    .filter-bar input[type=range] { flex: 1; }
    .badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 0.82rem; color: var(--accent); white-space: nowrap; font-weight: 500; }

    /* ── Map area (relative for card overlay) ── */
    .map-area { flex: 1; position: relative; min-height: 0; }
    #map { position: absolute; inset: 0; }

    /* ── Card strip overlay ── */
    .card-strip-wrap {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 1000;
      transition: transform 0.3s ease;
    }
    .card-strip-wrap.collapsed { transform: translateY(calc(100% - 36px)); }

    /* Handle bar */
    .strip-handle {
      display: flex; align-items: center; justify-content: center;
      padding: 6px 12px 4px;
      position: relative;
    }
    .strip-pill {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.25);
      cursor: grab;
    }
    .strip-collapse-btn {
      position: absolute; right: 12px;
      background: rgba(22,27,34,0.75);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.7rem;
      padding: 3px 8px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.15s;
      white-space: nowrap;
    }
    .strip-collapse-btn:hover { color: var(--text); }
    .card-strip-wrap.collapsed .strip-collapse-btn { color: var(--accent); }

    /* Cards */
    .card-strip {
      display: flex; gap: 10px;
      padding: 4px 50% 12px;
      overflow-x: auto; scroll-snap-type: x mandatory;
      scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .card-strip::-webkit-scrollbar { display: none; }
    .card {
      scroll-snap-align: center; flex-shrink: 0; width: 200px;
      background: rgba(22,27,34,0.72);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid rgba(48,54,61,0.7);
      border-radius: 12px; padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
      opacity: 0.6;
    }
    .card.selected { opacity: 1; }
    .card-conf { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
    .card-row { font-size: 0.78rem; color: var(--muted); line-height: 1.7; }
    .card-row span { color: var(--text); }
    .card-district { font-size: 0.73rem; color: var(--muted); margin-top: 4px; font-style: italic; min-height: 1.1em; }

    /* ── Buttons ── */
    .btn-header {
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); height: 36px; padding: 0 12px;
      font-size: 0.8rem; white-space: nowrap; cursor: pointer; transition: background 0.15s;
    }
    .btn-header:hover { background: #2d333b; }
    .btn-icon {
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); width: 42px; height: 42px; font-size: 1.1rem;
      cursor: pointer; flex-shrink: 0; transition: background 0.15s;
    }
    .btn-icon:hover { background: #2d333b; }
    .btn-icon.active { background: #1f3550; border-color: var(--accent); color: var(--accent); }

    /* ── Sidebar internals ── */
    .section-label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .slider-wrap { display: flex; flex-direction: column; gap: 6px; }
    .slider-val { font-size: 1.1rem; font-weight: 600; color: var(--accent); }
    input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border); border-radius: 2px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid var(--bg); }
    input[type=range]::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid var(--bg); }
    .filter-select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 8px 10px;
      font-size: 0.82rem; cursor: pointer; outline: none;
      -webkit-appearance: none; appearance: none;
    }
    .filter-select:focus { border-color: var(--accent); }
    .legend { display: flex; flex-direction: column; gap: 7px; }
    .legend-item { display: flex; align-items: center; gap: 9px; font-size: 0.83rem; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .metric-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; }
    .metric-label { font-size: 0.73rem; color: var(--muted); margin-bottom: 4px; }
    .metric-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .status { display: flex; flex-direction: column; gap: 4px; }
    .status-dot { color: var(--green); font-size: 0.82rem; }
    .status-date { color: var(--muted); font-size: 0.75rem; }
    hr { border: none; border-top: 1px solid var(--border); }

    /* ── Leaflet popup ── */
    .leaflet-popup-content-wrapper { background: var(--surface) !important; color: var(--text) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important; }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 12px 14px !important; min-width: 160px; }
    .popup-conf { font-size: 1.1rem; font-weight: 700; }
    .popup-meta { font-size: 0.82rem; color: var(--muted); margin-top: 6px; line-height: 1.7; }
    .popup-divider { border-top: 1px solid var(--border); margin: 7px 0; }

    /* ── Location pulse ── */
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.9} 50%{transform:scale(1.6);opacity:.3} }
    .loc-pulse { width:14px;height:14px;border-radius:50%;background:#58a6ff;box-shadow:0 0 0 3px rgba(88,166,255,.4);animation:pulse 2s infinite; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <button class="btn-header" onclick="toggleLang()" id="btn-lang-sb">🇬🇧 English</button>
      <hr>

      <!-- Confidence filter -->
      <div class="slider-wrap">
        <div class="section-label" data-i18n="filter_header">Filtros</div>
        <div class="slider-val"><span id="sb-conf-val">50</span>%</div>
        <input type="range" id="sb-slider" min="0" max="100" value="50" step="5" oninput="syncSlider('sb')">
      </div>

      <!-- Date filter -->
      <div>
        <div class="section-label" data-i18n="filter_date_label">Fecha de detección</div>
        <select class="filter-select" id="filter-date" onchange="renderAll()">
          <option value="all" data-i18n="filter_all">Todas</option>
        </select>
      </div>

      <!-- District filter -->
      <div>
        <div class="section-label" data-i18n="filter_district_label">Distrito / Provincia</div>
        <select class="filter-select" id="filter-district" onchange="renderAll()">
          <option value="all" data-i18n="filter_all">Todas</option>
        </select>
      </div>

      <hr>
      <div>
        <div class="section-label" data-i18n="legend_title">Nivel de confianza</div>
        <div class="legend" style="margin-top:8px">
          <div class="legend-item"><span class="dot" style="background:var(--high)"></span><span data-i18n="legend_high">Alta ≥ 85%</span></div>
          <div class="legend-item"><span class="dot" style="background:var(--mid)"></span><span data-i18n="legend_mid">Media 70–84%</span></div>
          <div class="legend-item"><span class="dot" style="background:var(--low)"></span><span data-i18n="legend_low">Baja &lt; 70%</span></div>
        </div>
      </div>
      <hr>
      <div class="metric-card">
        <div class="metric-label" data-i18n="metric_label">Detecciones visibles</div>
        <div class="metric-value" id="sb-metric">— / —</div>
      </div>
      <hr>
      <div class="status">
        <div class="section-label" data-i18n="data_status">Estado</div>
        <div class="status-dot">● <span data-i18n="status_demo">Demo — datos simulados</span></div>
        <div class="status-date"><span data-i18n="last_update">Último lote</span>: 2025-03-19</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Header -->
    <div class="header">
      <div class="header-row">
        <button class="btn-icon" onclick="toggleSidebar()" id="btn-menu">☰</button>
        <div class="header-center">
          <div class="title">🛰️ Orbit Sentinel</div>
          <div class="subtitle" data-i18n="subtitle">Detección de pistas clandestinas · Perú</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:stretch">
          <button class="btn-header" onclick="toggleLang()" id="btn-lang-top">🇬🇧 English</button>
          <button class="btn-header" onclick="toggleMapTile()" id="btn-tile">🗺 Street</button>
        </div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="filter-bar-row">
        <label data-i18n="slider_label">Confianza mínima (%)</label>
        <input type="range" id="main-slider" min="0" max="100" value="50" step="5" oninput="syncSlider('main')">
        <div class="badge" id="main-conf-val">50%</div>
        <div class="badge" id="main-metric">— / —</div>
      </div>
    </div>

    <!-- Map + card overlay -->
    <div class="map-area">
      <div id="map"></div>

      <!-- Card strip (overlays map bottom) -->
      <div class="card-strip-wrap" id="card-strip-wrap">
        <div class="strip-handle" id="strip-handle">
          <div class="strip-pill" id="strip-pill"></div>
          <button class="strip-collapse-btn" id="strip-collapse-btn" onclick="toggleStrip()">
            <span id="strip-btn-label">▼ <span data-i18n="strip_hide">Ocultar</span></span>
          </button>
        </div>
        <div class="card-strip" id="card-strip"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── i18n ──────────────────────────────────────────────────────────────────
const TEXTS = {
  es: {
    filter_header:        "Confianza mínima",
    slider_label:         "Confianza mínima (%)",
    filter_date_label:    "Fecha de detección",
    filter_district_label:"Distrito / Provincia",
    filter_all:           "Todas",
    legend_title:         "Nivel de confianza",
    legend_high:          "Alta ≥ 85%",
    legend_mid:           "Media 70–84%",
    legend_low:           "Baja < 70%",
    metric_label:         "Detecciones visibles",
    popup_date:           "Fecha",
    popup_coord:          "Coord.",
    popup_district:       "Área",
    lang_toggle:          "🇬🇧 English",
    last_update:          "Último lote",
    data_status:          "Estado",
    status_demo:          "Demo — datos simulados",
    subtitle:             "Detección de pistas clandestinas · Perú",
    loading:              "cargando…",
    strip_hide:           "Ocultar",
    strip_show:           "Mostrar detecciones",
  },
  en: {
    filter_header:        "Minimum confidence",
    slider_label:         "Minimum confidence (%)",
    filter_date_label:    "Detection date",
    filter_district_label:"District / Province",
    filter_all:           "All",
    legend_title:         "Confidence level",
    legend_high:          "High ≥ 85%",
    legend_mid:           "Medium 70–84%",
    legend_low:           "Low < 70%",
    metric_label:         "Visible detections",
    popup_date:           "Date",
    popup_coord:          "Coord.",
    popup_district:       "Area",
    lang_toggle:          "🇪🇸 Español",
    last_update:          "Last batch",
    data_status:          "Status",
    status_demo:          "Demo — simulated data",
    subtitle:             "Clandestine airstrip detection · Peru",
    loading:              "loading…",
    strip_hide:           "Hide",
    strip_show:           "Show detections",
  },
};
let lang = "es";

function applyLang() {
  const t = TEXTS[lang];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (t[key] !== undefined) el.textContent = t[key];
  });
  document.getElementById("btn-lang-sb").textContent  = t.lang_toggle;
  document.getElementById("btn-lang-top").textContent = t.lang_toggle;
  document.documentElement.lang = lang;
  refreshSelectLabels();
  renderAll();
}
function toggleLang() { lang = lang === "es" ? "en" : "es"; applyLang(); }

// ── Detection data ─────────────────────────────────────────────────────────
const DETECTIONS = [
  { lat: -3.7491,  lon: -73.2538, conf: 0.91, date: "2025-03-15" },
  { lat: -5.1843,  lon: -75.0152, conf: 0.84, date: "2025-03-15" },
  { lat: -4.5621,  lon: -74.1834, conf: 0.72, date: "2025-03-15" },
  { lat: -6.3217,  lon: -76.5409, conf: 0.63, date: "2025-03-15" },
  { lat: -7.1562,  lon: -75.8823, conf: 0.55, date: "2025-03-15" },
  { lat: -3.2984,  lon: -72.6741, conf: 0.88, date: "2025-03-16" },
  { lat: -8.8043,  lon: -74.9215, conf: 0.77, date: "2025-03-16" },
  { lat: -13.5317, lon: -72.8818, conf: 0.69, date: "2025-03-17" },
  { lat: -11.2451, lon: -75.3394, conf: 0.82, date: "2025-03-17" },
  { lat: -14.0672, lon: -73.4129, conf: 0.58, date: "2025-03-17" },
  { lat: -12.5934, lon: -70.0817, conf: 0.95, date: "2025-03-18" },
  { lat: -11.8763, lon: -71.3452, conf: 0.87, date: "2025-03-18" },
  { lat: -13.1289, lon: -69.6543, conf: 0.74, date: "2025-03-18" },
  { lat: -0.1834,  lon: -75.8712, conf: 0.61, date: "2025-03-19" },
  { lat: -1.5423,  lon: -77.1234, conf: 0.79, date: "2025-03-19" },
];
const geoCache = new Array(DETECTIONS.length).fill(null);

function tierColor(conf) {
  if (conf >= 0.85) return "#E53935";
  if (conf >= 0.70) return "#FB8C00";
  return "#1E88E5";
}

// ── Map ────────────────────────────────────────────────────────────────────
const map = L.map("map", { zoomControl: true, tap: true }).setView([-9.19, -75.0], 6);
const TILES = {
  satellite: L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    attribution: '© <a href="https://www.esri.com">Esri</a>', maxZoom: 19,
  }),
  street: L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    attribution: '© <a href="https://carto.com">CARTO</a>', subdomains: "abcd", maxZoom: 19,
  }),
};
TILES.satellite.addTo(map);
let currentTile = "satellite";

function toggleMapTile() {
  const btn = document.getElementById("btn-tile");
  if (currentTile === "satellite") {
    map.removeLayer(TILES.satellite); TILES.street.addTo(map);
    currentTile = "street"; btn.textContent = "🛰 Satellite";
  } else {
    map.removeLayer(TILES.street); TILES.satellite.addTo(map);
    currentTile = "satellite"; btn.textContent = "🗺 Street";
  }
}

// ── Current location ───────────────────────────────────────────────────────
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    const icon = L.divIcon({ className: '', html: '<div class="loc-pulse"></div>', iconSize: [14,14], iconAnchor: [7,7] });
    L.marker([lat, lon], { icon }).addTo(map)
      .bindTooltip("📍 Tu ubicación", { permanent: false });
  }, () => {});
}

// ── Filters ────────────────────────────────────────────────────────────────
function getFilteredIndices() {
  const minConf   = parseInt(document.getElementById("main-slider").value) / 100;
  const selDate   = document.getElementById("filter-date").value;
  const selDist   = document.getElementById("filter-district").value;

  return DETECTIONS
    .map((d, i) => i)
    .filter(i => {
      const d = DETECTIONS[i];
      if (d.conf < minConf) return false;
      if (selDate !== "all" && d.date !== selDate) return false;
      if (selDist !== "all" && geoCache[i] !== selDist) return false;
      return true;
    })
    .sort((a, b) => DETECTIONS[b].conf - DETECTIONS[a].conf); // high → low
}

function populateDateSelect() {
  const sel  = document.getElementById("filter-date");
  const cur  = sel.value;
  const t    = TEXTS[lang];
  const dates = [...new Set(DETECTIONS.map(d => d.date))].sort();
  sel.innerHTML = `<option value="all">${t.filter_all}</option>` +
    dates.map(d => `<option value="${d}"${cur===d?' selected':''}>${d}</option>`).join("");
}

function populateDistrictSelect() {
  const sel  = document.getElementById("filter-district");
  const cur  = sel.value;
  const t    = TEXTS[lang];
  const dists = [...new Set(geoCache.filter(Boolean))].sort();
  sel.innerHTML = `<option value="all">${t.filter_all}</option>` +
    dists.map(d => `<option value="${d}"${cur===d?' selected':''}>${d}</option>`).join("");
}

function refreshSelectLabels() {
  populateDateSelect();
  populateDistrictSelect();
}

// ── Markers & selection ────────────────────────────────────────────────────
let markerObjects  = [];
let filteredIndices = [];
let selectedFi     = 0;

function renderAll() {
  filteredIndices = getFilteredIndices();
  markerObjects.forEach(({ marker }) => map.removeLayer(marker));
  markerObjects = [];

  filteredIndices.forEach((detIdx, fi) => {
    const d = DETECTIONS[detIdx];
    const color = tierColor(d.conf);
    const marker = L.circleMarker([d.lat, d.lon], {
      radius: 10, color, weight: 2, fillColor: color, fillOpacity: 0.75,
    });
    marker.on('click', () => { selectFi(fi, true); scrollCardTo(fi); });
    marker.addTo(map);
    markerObjects.push({ marker, detIdx });
  });

  updateMetrics();
  renderCards();
  if (selectedFi >= filteredIndices.length) selectedFi = 0;
  applySelection(selectedFi, false);
}

function selectFi(fi, panMap) {
  selectedFi = fi;
  applySelection(fi, panMap);
  scrollCardTo(fi);
}

function applySelection(fi, panMap) {
  markerObjects.forEach(({ marker, detIdx }, i) => {
    const color = tierColor(DETECTIONS[detIdx].conf);
    const sel   = i === fi;
    marker.setStyle({ radius: sel ? 13 : 10, weight: sel ? 3 : 2, fillOpacity: sel ? 1 : 0.65, color: sel ? '#ffffff' : color, fillColor: color });
    if (sel) marker.bringToFront();
  });
  document.querySelectorAll('.card').forEach((el, i) => {
    const sel   = i === fi;
    const color = tierColor(DETECTIONS[filteredIndices[i]].conf);
    el.classList.toggle('selected', sel);
    el.style.borderColor = sel ? color : 'rgba(48,54,61,0.7)';
    el.style.boxShadow   = sel ? `0 0 0 2px ${color}55` : 'none';
  });
  if (panMap && filteredIndices[fi] !== undefined) {
    const d = DETECTIONS[filteredIndices[fi]];
    map.panTo([d.lat, d.lon], { animate: true, duration: 0.5 });
  }
}

// ── Cards ──────────────────────────────────────────────────────────────────
function renderCards() {
  const t     = TEXTS[lang];
  const strip = document.getElementById("card-strip");
  strip.innerHTML = filteredIndices.map((detIdx, fi) => {
    const d     = DETECTIONS[detIdx];
    const color = tierColor(d.conf);
    const geo   = geoCache[detIdx];
    const distLine = geo
      ? `<div class="card-district">🏛 ${geo}</div>`
      : `<div class="card-district" id="geo-${fi}">🏛 ${t.loading}</div>`;
    return `<div class="card" data-fi="${fi}" onclick="selectFi(${fi}, true)">
      <div class="card-conf" style="color:${color}">${(d.conf*100).toFixed(1)}%</div>
      <div class="card-row">📅 <span>${d.date}</span></div>
      <div class="card-row">📍 <span>${d.lat.toFixed(3)}, ${d.lon.toFixed(3)}</span></div>
      ${distLine}
    </div>`;
  }).join("");
  strip.onscroll = onStripScroll;
}

function scrollCardTo(fi) {
  const strip = document.getElementById("card-strip");
  const card  = strip.querySelector(`[data-fi="${fi}"]`);
  if (!card) return;
  strip.scrollTo({ left: card.offsetLeft - strip.clientWidth / 2 + card.offsetWidth / 2, behavior: "smooth" });
}

let scrollTimer = null;
function onStripScroll() {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    const strip  = document.getElementById("card-strip");
    const center = strip.scrollLeft + strip.clientWidth / 2;
    let minDist = Infinity, closestFi = 0;
    strip.querySelectorAll('.card').forEach(card => {
      const dist = Math.abs(card.offsetLeft + card.offsetWidth / 2 - center);
      if (dist < minDist) { minDist = dist; closestFi = parseInt(card.dataset.fi); }
    });
    if (closestFi !== selectedFi) { selectedFi = closestFi; applySelection(closestFi, true); }
  }, 80);
}

// ── Card strip collapse ────────────────────────────────────────────────────
let stripCollapsed = false;

function toggleStrip() {
  stripCollapsed = !stripCollapsed;
  const wrap = document.getElementById("card-strip-wrap");
  const btn  = document.getElementById("strip-btn-label");
  const t    = TEXTS[lang];
  wrap.classList.toggle("collapsed", stripCollapsed);
  btn.innerHTML = stripCollapsed
    ? `▲ ${t.strip_show}`
    : `▼ <span data-i18n="strip_hide">${t.strip_hide}</span>`;
}

// Swipe-down to collapse (mobile)
(function () {
  const handle = document.getElementById("strip-handle");
  let startY = 0;
  handle.addEventListener("touchstart", e => { startY = e.touches[0].clientY; }, { passive: true });
  handle.addEventListener("touchend",   e => {
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 50 && !stripCollapsed) toggleStrip();
    if (dy < -50 && stripCollapsed)  toggleStrip();
  }, { passive: true });
})();

// ── Reverse geocoding ──────────────────────────────────────────────────────
async function fetchDistrict(detIdx) {
  if (geoCache[detIdx] !== null) return;
  const d = DETECTIONS[detIdx];
  try {
    const res  = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${d.lat}&lon=${d.lon}&format=json&zoom=10`,
      { headers: { "Accept-Language": "es" } }
    );
    const data = await res.json();
    const addr = data.address || {};
    geoCache[detIdx] = addr.county || addr.state_district || addr.state || "—";
  } catch { geoCache[detIdx] = "—"; }

  // Update card if visible
  const fi = filteredIndices.indexOf(detIdx);
  if (fi >= 0) {
    const el = document.getElementById(`geo-${fi}`);
    if (el) el.textContent = `🏛 ${geoCache[detIdx]}`;
  }
  // Repopulate district select
  populateDistrictSelect();
}

async function prefetchGeo() {
  for (let i = 0; i < DETECTIONS.length; i++) {
    await fetchDistrict(i);
    await new Promise(r => setTimeout(r, 1100));
  }
}

// ── Slider sync ────────────────────────────────────────────────────────────
function syncSlider(source) {
  const val = document.getElementById(source === "sb" ? "sb-slider" : "main-slider").value;
  document.getElementById("sb-slider").value   = val;
  document.getElementById("main-slider").value = val;
  document.getElementById("sb-conf-val").textContent   = val;
  document.getElementById("main-conf-val").textContent = val + "%";
  renderAll();
}

function updateMetrics() {
  const c = `${filteredIndices.length} / ${DETECTIONS.length}`;
  document.getElementById("sb-metric").textContent   = c;
  document.getElementById("main-metric").textContent = c;
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sb  = document.getElementById("sidebar");
  const btn = document.getElementById("btn-menu");
  const isOpen = sb.classList.toggle("open");
  btn.classList.toggle("active", isOpen);
  setTimeout(() => map.invalidateSize(), 270);
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById("sb-conf-val").textContent   = "50";
document.getElementById("main-conf-val").textContent = "50%";
populateDateSelect();
populateDistrictSelect();
renderAll();
setTimeout(() => scrollCardTo(0), 100);
prefetchGeo();
</script>
